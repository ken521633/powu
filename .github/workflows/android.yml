name: Build Release AAB

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 终极保险：最多跑15分钟，超时自动掐断报错

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release AAB
        # 核心修改：强制输出所有日志详情，拒绝后台死锁卡顿！
        run: ./gradlew bundleRelease --no-daemon --stacktrace --console=plain

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: powu-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
